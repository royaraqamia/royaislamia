name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '42 5 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual
        - language: javascript-typescript
          build-mode: none
        - language: swift
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- Next.js Setup (JavaScript/TypeScript Analysis) ---
    - name: Setup Node.js (Next.js)
      if: matrix.language == 'javascript-typescript'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'

    - name: Install Web Dependencies
      if: matrix.language == 'javascript-typescript'
      run: npm ci
      working-directory: ./web

    # --- Flutter & Mobile SDK Setup (Java/Kotlin & Swift Analysis) ---
    - name: Setup Java SDK
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter Environment
      if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Handle Missing Environment Configuration
      if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
      run: touch .env
      working-directory: ./mobile_app

    - name: Install Flutter Dependencies
      if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
      run: flutter pub get
      working-directory: ./mobile_app

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    # --- CodeQL Manual Compilations ---
    - name: Build Android App (Java/Kotlin)
      if: matrix.language == 'java-kotlin' && matrix.build-mode == 'manual'
      run: flutter build apk --debug
      working-directory: ./mobile_app

    - name: Build iOS App (Swift)
      if: matrix.language == 'swift' && matrix.build-mode == 'manual'
      run: |
        flutter build ios --simulator --no-codesign --config-only
      working-directory: ./mobile_app

    # --- Perform Analysis ---
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"