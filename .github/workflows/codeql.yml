name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '42 5 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
            
    steps:
    - name: Checkout
      uses: actions/checkout@v7.0.0

    # --- Next.js Setup (JavaScript/TypeScript Analysis) ---
    - name: Setup Build Environment for Web
      if: matrix.language == 'javascript-typescript'
      uses: ./.github/actions/setup-environment
      with:
        node-version: '24'
        install-mobile-deps: 'false'

    # --- Flutter & Mobile SDK Setup (Java/Kotlin & Swift Analysis) ---
    - name: Setup Java JDK
      if: matrix.language == 'java-kotlin'
      uses: actions/setup-java@v5.4.0
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Build Environment for Mobile
      if: matrix.language == 'java-kotlin' || matrix.language == 'swift'
      uses: ./.github/actions/setup-environment
      with:
        flutter-version: '3.44.0'
        install-web-deps: 'false'

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    # --- CodeQL Manual Compilations ---
    - name: Build Android App (Java/Kotlin)
      if: matrix.language == 'java-kotlin' && matrix.build-mode == 'manual'
      run: flutter build apk --debug
      working-directory: ./mobile_app

    - name: Build iOS App (Swift)
      if: matrix.language == 'swift' && matrix.build-mode == 'manual'
      run: |
        cd ios
        xcodebuild -workspace Runner.xcworkspace -scheme Runner -sdk iphonesimulator -configuration Debug CODE_SIGNING_ALLOWED=NO
      working-directory: ./mobile_app

    # --- Perform Analysis ---
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"