name: 'Setup Build Environment'
description: 'Sets up Node.js and Flutter environments for the monorepo'

inputs:
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '24'
  flutter-version:
    description: 'Flutter version to install'
    required: false
    default: '3.44.0'
  install-web-deps:
    description: 'Whether to install web dependencies'
    required: false
    default: 'true'
  install-mobile-deps:
    description: 'Whether to install mobile dependencies'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'

    - name: Install Web Dependencies
      if: inputs.install-web-deps == 'true'
      run: npm ci
      working-directory: ./web
      shell: bash

    - name: Setup Flutter
      uses: subosito/flutter-action@v2.23.0
      with:
        flutter-version: ${{ inputs.flutter-version }}
        channel: 'stable'
        cache: true

    - name: Handle Missing Environment Configuration
      if: inputs.install-mobile-deps == 'true'
      run: touch .env
      working-directory: ./mobile_app
      shell: bash

    - name: Install Flutter Dependencies
      if: inputs.install-mobile-deps == 'true'
      run: flutter pub get
      working-directory: ./mobile_app
      shell: bash